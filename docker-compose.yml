services:
  db:
    image: postgres:16-alpine
    container_name: presenca-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: "sicoob@3178"
      POSTGRES_DB: assembleia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresql -d assembleia"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: presenca-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgresql:sicoob%403178@db:5432/assembleia?sslmode=disable"
      DATABASE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pnpm drizzle-kit generate &&
             pnpm drizzle-kit migrate &&
             (pnpm seed || echo 'Seed ignorado: admin já existe')"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: presenca-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgresql:sicoob%403178@db:5432/assembleia?sslmode=disable"
      DATABASE_SSL: "false"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
