services:
  db:
    image: postgres:17
    container_name: presenca-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: "admin"
      POSTGRES_DB: assembleia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresql -d assembleia"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: presenca-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgresql:admin@db:5432/assembleia"
      DATABASE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: presenca-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgresql:admin@db:5432/assembleia"
      DATABASE_SSL: "false"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
