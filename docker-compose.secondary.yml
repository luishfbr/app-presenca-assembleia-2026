services:
  db:
    image: postgres:17
    container_name: presenca-db-standby
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: "admin"
      PGUSER: postgresql
      PRIMARY_HOST: 10.1.1.1
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: repl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-secondary/init-standby.sh:/init-standby.sh
    entrypoint: ["/bin/bash", "/init-standby.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresql"]
      interval: 5s
      timeout: 5s
      retries: 20

  # App fica parada até o failover — só sobe na emergência
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: presenca-app
    restart: "no"
    profiles:
      - failover   # só sobe com: docker compose --profile failover up
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgresql:admin@db:5432/assembleia"
      DATABASE_SSL: "false"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: